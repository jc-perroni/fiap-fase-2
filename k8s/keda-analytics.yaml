apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: keda-aws-credentials
  namespace: feature-flags
spec:
  secretTargetRef:
    - parameter: awsAccessKeyID
      name: aws-secret
      key: AWS_ACCESS_KEY_ID
    - parameter: awsSecretAccessKey
      name: aws-secret
      key: AWS_SECRET_ACCESS_KEY

---
# -----------------------------------------------------------------------------
# ScaledObject — monitora a fila SQS e escala o analytics-service de 0 a N
# -----------------------------------------------------------------------------
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: analytics-service-scaler
  namespace: feature-flags
spec:
  scaleTargetRef:
    name: analytics-service # nome do Deployment alvo

  # Escala para zero quando a fila estiver vazia
  minReplicaCount: 0
  maxReplicaCount: 10

  # Intervalo de polling da fila (segundos)
  pollingInterval: 30

  # Tempo sem mensagens antes de voltar para 0 réplicas (segundos)
  cooldownPeriod: 300

  triggers:
    - type: aws-sqs-queue
      authenticationRef:
        name: keda-aws-credentials
      metadata:
        # URL completa da fila
        queueURL: https://sqs.us-east-1.amazonaws.com/653509254250/evaluation-service-sqs
        # Número de mensagens por pod (1 pod a cada 10 mensagens na fila)
        queueLength: "10"
        awsRegion: us-east-1
